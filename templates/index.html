<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Detection System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 650px;
            margin: auto;
        }

        .card {
            border-radius: 15px;
        }

        #results img {
            max-height: 400px;
            margin-top: 15px;
        }

        .btn {
            width: 100%;
        }

        .lead {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Heading -->
    <div class="text-center">
        <h1 class="display-5 text-primary">
            Breast Cancer Detection System
        </h1>

        <p class="lead text-secondary">
            Upload a breast histopathology image to detect whether it is
            Benign or Malignant.
        </p>
    </div>

    <!-- Upload Form -->
    <div class="card shadow p-4 mt-4">
        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label for="file" class="form-label">
                    Select Breast Tissue Image:
                </label>

                <input
                    type="file"
                    class="form-control"
                    id="file"
                    name="file"
                    accept="image/*"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">
                Upload and Detect
            </button>

        </form>
    </div>

    <!-- Results -->
    {% if result %}
    <div id="results" class="mt-4">
        <div class="card shadow">

            <div class="card-body text-center">

                {% if "Malignant" in result %}
                    <h4 class="text-danger">{{ result }}</h4>
                {% else %}
                    <h4 class="text-success">{{ result }}</h4>
                {% endif %}

                <p class="text-muted">
                    Confidence: {{ confidence }}
                </p>

                <img
                    src="{{ file_path }}"
                    class="img-fluid rounded"
                    alt="Uploaded Image">

            </div>
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
